services:
  nolapenses-preview:
    image: nginx:alpine
    container_name: nolapenses-preview
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ../../:/usr/share/nginx/html:ro
      - ./nginx.preview.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
